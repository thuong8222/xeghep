plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
    id("com.google.gms.google-services")
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion "27.1.12297006"
    buildToolsVersion "35.0.0"
    compileSdk 35

    namespace "com.xeghep"
    defaultConfig {
        applicationId "com.xeghep"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 3
        versionName "0.0.3"
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('xeghep-release.keystore')
            storePassword project.XE_GHEP_STORE_PASSWORD
            keyAlias 'xeghep_key'
            keyPassword project.XE_GHEP_KEY_PASSWORD
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

react {
    /* Autolinking */
    autolinkLibrariesWithApp()
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("org.slf4j:slf4j-android:1.7.32")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}